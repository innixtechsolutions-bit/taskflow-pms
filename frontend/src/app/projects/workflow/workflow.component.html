<div class="workflow-page">
  <a class="back-link" [routerLink]="['/projects', projectId]">&larr; Back to project</a>
  <h1>Workflow</h1>
  <ul class="workflow-list">
    @for (status of statuses(); track status.id) {
      <li class="workflow-row">
        <span class="workflow-name">{{ status.name }}</span>
        <span class="workflow-category">{{ status.category }}</span>
        <span class="workflow-count">{{ status.itemCount }} item(s)</span>
      </li>
    }
  </ul>

  <form class="add-status-form" (submit)="$event.preventDefault(); onAddStatus()">
    <input
      class="add-status-name"
      type="text"
      placeholder="New status name"
      [value]="newStatusName()"
      (input)="newStatusName.set($any($event.target).value)"
    />
    <select
      class="add-status-category"
      [value]="newStatusCategory()"
      (change)="newStatusCategory.set($any($event.target).value)"
    >
      <option value="Open">Open</option>
      <option value="Done">Done</option>
    </select>
    <button type="submit">Add status</button>
  </form>
</div>
