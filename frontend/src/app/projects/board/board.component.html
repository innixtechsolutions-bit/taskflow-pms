<div class="board" cdkDropListGroup>
  @for (column of columns(); track column.statusId) {
    <div class="board-column">
      <div class="board-column-header">
        <span class="board-column-label">{{ column.name }}</span>
        <span class="board-column-count">{{ column.items.length }}</span>
        <a
          class="board-column-add"
          [routerLink]="['/projects', projectId(), 'work-items', 'new']"
          [queryParams]="{ statusId: column.statusId }"
          title="Add to {{ column.name }}"
          aria-label="Add to {{ column.name }}"
          >+</a
        >
      </div>
      <div
        class="board-column-body"
        cdkDropList
        [cdkDropListData]="column.items"
        (cdkDropListDropped)="onDrop($event, column.statusId)"
      >
        @if (column.items.length === 0) {
          <app-empty-state icon="inbox" message="No items" />
        } @else {
          @for (item of column.items; track item.id) {
            <app-board-card [card]="item" [projectId]="projectId()" [dragDisabled]="!canDrag(item)" />
          }
        }
      </div>
    </div>
  }
</div>
