<div
  class="board-card"
  [class.drag-disabled]="dragDisabled()"
  cdkDrag
  [cdkDragData]="card()"
  [cdkDragDisabled]="dragDisabled()"
>
  <a class="card-link" [routerLink]="['/projects', projectId(), 'work-items', card().id]">
    <p class="card-title">{{ card().title }}</p>

    <div class="card-meta">
      <span class="card-key">#{{ card().id }}</span>
      <span class="card-type">{{ card().type }}</span>
      <app-priority-chip class="card-priority" [priority]="card().priority" />
    </div>

    @if (hasChildren()) {
      <p class="card-progress">{{ card().directChildrenDoneCount }}/{{ card().directChildrenCount }} done</p>
    }

    <div class="card-footer">
      @if (card().dueDate) {
        <span class="card-due-date" [class.due-date-overdue]="isOverdue()">
          {{ card().dueDate | friendlyDate }}
        </span>
      }
      @if (card().assigneeName) {
        <app-user-avatar [fullName]="card().assigneeName!" />
      } @else {
        <span class="unassigned-indicator" title="Unassigned" aria-label="Unassigned"></span>
      }
    </div>
  </a>
</div>
