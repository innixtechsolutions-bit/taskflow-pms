<app-page-header title="Users" subtitle="Manage team members and their roles." />

@if (errorMessage()) {
  <p class="server-error" role="alert">{{ errorMessage() }}</p>
}

<table mat-table [dataSource]="items()" class="mat-elevation-z1">
  <ng-container matColumnDef="fullName">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let user"><app-user-avatar [fullName]="user.fullName" [showName]="true" /></td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef>Email</th>
    <td mat-cell *matCellDef="let user">{{ user.email }}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef>Role</th>
    <td mat-cell *matCellDef="let user">
      <select (change)="onRoleChange(user, $any($event.target))">
        @for (role of roles; track role) {
          <!-- [selected] on each <option>, not [value] on the <select>: Angular
               sets a <select>'s own [value] binding before its @for-rendered
               <option> children exist in the DOM, so the browser has nothing yet
               to match against and silently falls back to the first option. -->
          <option [value]="role" [selected]="role === user.role">{{ role }}</option>
        }
      </select>
    </td>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef>Registered</th>
    <td mat-cell *matCellDef="let user">{{ user.createdAt | friendlyDate }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<div class="pagination-controls">
  <button mat-stroked-button type="button" (click)="prevPage()" [disabled]="page() === 1">Previous</button>
  <button mat-stroked-button type="button" (click)="nextPage()" [disabled]="page() * pageSize >= totalCount()">Next</button>
</div>
