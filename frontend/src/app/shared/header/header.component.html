<header>
  <mat-toolbar color="primary">
    <span class="signed-in-name">{{ authService.currentUser()?.fullName }}</span>
    <span class="signed-in-role">{{ authService.currentUser()?.role }}</span>
    <span class="toolbar-spacer"></span>
    @if (authService.currentRole() === 'Admin') {
      <a mat-button routerLink="/users">Users</a>
    }
    <button mat-button type="button" (click)="onLogout()">Log out</button>
  </mat-toolbar>
</header>
